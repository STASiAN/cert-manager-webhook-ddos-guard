name: Release

# Publishes the multi-arch Docker image and the Helm chart (as an OCI
# artifact) to GitHub Container Registry (ghcr.io).
#
#   Image:  ghcr.io/<owner>/cert-manager-webhook-ddos-guard:<version>
#   Chart:  oci://ghcr.io/<owner>/charts/cert-manager-webhook-ddos-guard:<version>
#
# Triggered by pushing a semver tag (e.g. v1.2.3) or manually via the
# Actions UI (supply the version to publish).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (semver, without leading 'v'), e.g. 1.2.3"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  image:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$version" ]; then
            echo "::error::Could not determine version to publish"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing version $version"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.version.outputs.version }}
            type=semver,pattern={{major}},value=v${{ steps.version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  chart:
    name: Package and push chart
    runs-on: ubuntu-latest
    needs: image
    permissions:
      contents: read
      packages: write
    env:
      VERSION: ${{ needs.image.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Compute lowercase owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Pin chart to the published image
        run: |
          chart_dir="deploy/cert-manager-webhook-ddos-guard"
          image_repo="${REGISTRY}/${IMAGE_NAME,,}"
          yq -i ".image.repository = \"${image_repo}\"" "${chart_dir}/values.yaml"
          yq -i ".image.tag = \"${VERSION}\"" "${chart_dir}/values.yaml"

      - name: Lint chart
        run: helm lint deploy/cert-manager-webhook-ddos-guard

      - name: Package chart
        run: |
          helm package deploy/cert-manager-webhook-ddos-guard \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --destination "${RUNNER_TEMP}/chart"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login "${REGISTRY}" \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Push chart to OCI registry
        run: |
          helm push \
            "${RUNNER_TEMP}/chart/cert-manager-webhook-ddos-guard-${VERSION}.tgz" \
            "oci://${REGISTRY}/${{ steps.owner.outputs.owner }}/charts"
